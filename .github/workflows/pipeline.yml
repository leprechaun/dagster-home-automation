name: CI

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ruff
        run: uv run ruff check

      - name: Run dg deps check
        run: uv run dg check defs

          #- name: Run tests
          #run: uv run pytest tests/

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: install wireguard
        run: |
          sudo apt install wireguard

      - name: setup wireguard
        run: |
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > /tmp/privatekey-file
          sudo ip link add dev wg0 type wireguard
          sudo ip address add dev wg0 ${{ secrets.WIREGUARD_LOCAL_PEER_ADDRESS }} peer ${{ secrets.WIREGUARD_REMOTE_PEER_ADDRESS }}
          sudo wg set wg0 listen-port 48123 private-key /tmp/privatekey-file peer ${{ secrets.WIREGUARD_PUBLIC_KEY }} allowed-ips ${{ secrets.WIREGUARD_ALLOWED_ADDRESSES }} endpoint ${{ secrets.WIREGUARD_ENDPOINT }}

          sudo ip link set up dev wg0

          sleep 2
          ping -c 2 10.99.3.1
          sudo wg show

          sudo ip route

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config

      - name: Get stuff
        run: |
          kubectl set image -n dagster deployment/dagster-dagster-user-deployments-home-automation dagster-user-deployments=ghcr.io/${{ github.repository }}:${{ github.run_number }}
          sleep 3
          kubectl get pods -n dagster
