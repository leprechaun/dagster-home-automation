---
global:
  postgresqlSecretName: "dagster-postgresql-secret"
  postgresqlAuthWifEnabled: false
  dagsterHome: "/opt/dagster/dagster_home"
  serviceAccountName: ""
  celeryConfigSecretName: "dagster-celery-config-secret"
  dagsterInstanceConfigMap: ""

dagsterHome: "/opt/dagster/dagster_home"
postgresqlSecretName: "dagster-postgresql-secret"
celeryConfigSecretName: "dagster-celery-config-secret"

deployments:
- name: "home-automation"
  image:
    repository: "ghcr.io/leprechaun/dagster-home-automation"
    tag: "VERSION"
    pullPolicy: Always

  dagsterApiGrpcArgs:
    - "--python-file"
    - "/deploy_k8s/src/dagster_home_automation/definitions.py"
  port: 3030
  envSecrets:
    - name: gadgetbridge
